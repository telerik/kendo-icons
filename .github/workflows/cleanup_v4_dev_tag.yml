name: "Cleanup: remove v4-dev dist-tag"

on: workflow_dispatch

jobs:
  cleanup:
    name: Remove v4-dev dist-tag
    runs-on: ubuntu-latest
    environment: upload

    permissions:
        id-token: write # Required by Akeyless
        contents: read
        packages: read

    steps:
      - name: Import Secrets
        id: import-secrets
        uses: LanceMcCarthy/akeyless-action@v5
        with:
          access-id: ${{ secrets.GH_AKEYLESS_ACCESS_ID }}
          static-secrets: |
            {
              "/WebComponents/prod/tokens/PROGRESS_NPM_REGISTRY_TOKEN": "NPM_TOKEN"
            }
          export-secrets-to-environment: false

      - name: Check out develop
        uses: actions/checkout@v6
        with:
          ref: develop

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'
        env:
          NODE_AUTH_TOKEN: ${{ steps.import-secrets.outputs.NPM_TOKEN }}

      - name: Remove v4-dev dist-tag
        run: |
          npm dist-tag rm @progress/kendo-font-icons v4-dev || true
          npm dist-tag rm @progress/kendo-svg-icons v4-dev || true
